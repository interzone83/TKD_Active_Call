<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <!--
    activecall.html generic reskin v1
    ------------------
    Combined incoming call + active call + declined/black screen behaviour.

    v4 changes:
    - Decline goes black after sheet-defined Decline Timeout Seconds.
    - While black after decline, page keeps polling the sheet.
    - If sheet is set back to Active = TRUE and Call State = incoming, incoming call appears again.
    - Calling... dots made slightly bigger/more visible.
    - Top status bar made slightly smaller.
    - Added clear comments for easy on-set edits.
  -->

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  >

  <title>Call</title>

  <style>
    /* ============================================================
       ACTIVE CALL GENERIC RESKIN v1
       ------------------------------------------------------------
       This is deliberately NOT iOS and NOT WhatsApp.
       It keeps the same functionality but changes the visual language
       to a generic Android/Samsung-adjacent phone UI.

       Logic, sheet settings, timers, accept/decline behaviour and
       ringtone handling are unchanged.
       ============================================================ */

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #05070a;
      font-family: Arial, Roboto, Helvetica, sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    .call-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      background:
        var(--wallpaper, none),
        radial-gradient(circle at 50% 6%, rgba(58, 92, 130, 0.42), transparent 34%),
        linear-gradient(
          180deg,
          var(--header-colour, #101923) 0%,
          var(--middle-colour, #111922) 48%,
          var(--footer-colour, #080d12) 100%
        );
      background-size: cover;
      background-position: center;
      color: var(--text-colour, #f4f7fb);
      opacity: 0;
    }

    .call-screen.ready { opacity: 1; }
    .hidden { display: none !important; }

    /* ============================================================
       TOP STATUS BAR
       ON-SET EDIT POINT: change font-size if status text is too big.
       ============================================================ */

    .status-bar {
      padding: calc(8px + env(safe-area-inset-top)) 18px 7px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1px;
      color: rgba(244, 247, 251, 0.92);
    }

    .status-right {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .signal-bars {
      display: flex;
      align-items: end;
      gap: 2px;
      height: 11px;
    }

    .signal-bars span {
      width: 3px;
      background: currentColor;
      border-radius: 2px;
      opacity: 0.28;
    }

    .signal-bars span:nth-child(1) { height: 3px; }
    .signal-bars span:nth-child(2) { height: 6px; }
    .signal-bars span:nth-child(3) { height: 8px; }
    .signal-bars span:nth-child(4) { height: 11px; }

    .signal-bars.bars-1 span:nth-child(-n+1),
    .signal-bars.bars-2 span:nth-child(-n+2),
    .signal-bars.bars-3 span:nth-child(-n+3),
    .signal-bars.bars-4 span:nth-child(-n+4) {
      opacity: 1;
    }

    .battery {
      width: 24px;
      height: 11px;
      border: 1.6px solid currentColor;
      border-radius: 3px;
      position: relative;
      overflow: hidden;
    }

    .battery::after {
      content: "";
      position: absolute;
      right: -4px;
      top: 3px;
      width: 3px;
      height: 5px;
      background: currentColor;
      border-radius: 0 2px 2px 0;
    }

    .battery-fill {
      height: 100%;
      width: 43%;
      background: currentColor;
    }

    /* Generic app label to move it away from iOS full-screen call styling. */
    .status-bar::after {
      content: "Voice call";
      position: absolute;
      top: calc(34px + env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(244, 247, 251, 0.46);
      pointer-events: none;
    }

    .call-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 42px 18px 92px;
      text-align: center;
    }

    /* ============================================================
       INCOMING CALLING... TEXT
       ON-SET EDIT POINT: change font-size to adjust Calling... size.
       ============================================================ */

    .incoming-status {
      font-size: 22px;
      color: var(--muted-text-colour, #aeb8c5);
      margin-bottom: 28px;
      height: 30px;
      letter-spacing: 0.02em;
      font-weight: 600;
    }

    .dots span {
      opacity: 0.25;
      animation: pulseDot 1.2s infinite;
      font-weight: 800;
    }

    .dots span:nth-child(2) { animation-delay: 0.18s; }
    .dots span:nth-child(3) { animation-delay: 0.36s; }

    @keyframes pulseDot {
      0%, 100% { opacity: 0.25; }
      45% { opacity: 1; }
    }

    .avatar {
      width: 128px;
      height: 128px;
      border-radius: 28px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.12), rgba(255,255,255,0.02)),
        var(--avatar-colour, #2d3a48);
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 46px;
      font-weight: 700;
      margin-bottom: 24px;
      box-shadow:
        0 18px 48px rgba(0,0,0,0.34),
        inset 0 0 0 1px rgba(255,255,255,0.10);
    }

    .caller-name {
      font-size: 31px;
      font-weight: 800;
      margin-bottom: 9px;
      letter-spacing: -0.02em;
    }

    .optional-status {
      font-size: 15px;
      color: var(--muted-text-colour, #aeb8c5);
      margin-bottom: 5px;
      display: none;
      font-weight: 600;
    }

    .optional-status.visible { display: block; }

    .call-timer {
      font-size: 18px;
      color: var(--muted-text-colour, #aeb8c5);
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .declined-text {
      font-size: 17px;
      color: var(--muted-text-colour, #aeb8c5);
      margin-top: 9px;
      font-weight: 700;
    }

    .call-footer {
      padding: 16px 20px calc(28px + env(safe-area-inset-bottom));
      background: rgba(5, 9, 13, 0.54);
      border-top: 1px solid rgba(255,255,255,0.07);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .control-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      align-items: end;
      gap: 12px;
      max-width: 460px;
      margin: 0 auto;
    }

    .incoming-row {
      grid-template-columns: 1fr 1fr;
      max-width: 330px;
      gap: 34px;
    }

    .control {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-colour, #f4f7fb);
      font-size: 12px;
      font-weight: 800;
      min-width: 0;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .control-circle {
      width: 66px;
      height: 56px;
      border-radius: 18px;
      background: var(--button-colour, #26313d);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      box-shadow:
        0 8px 22px rgba(0,0,0,0.24),
        inset 0 0 0 1px rgba(255,255,255,0.08);
      border: none;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .incoming-circle {
      width: 78px;
      height: 62px;
      border-radius: 20px;
    }

    .hangup-circle { background: var(--hangup-colour, #d83b36); }
    .accept-circle { background: var(--accept-colour, #168d5a); }

    .control-icon {
      width: 28px;
      height: 28px;
      display: block;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.45;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .speaker-icon,
    .mute-icon {
      width: 29px;
      height: 29px;
    }

    .handset-icon {
      width: 31px;
      height: 31px;
      fill: currentColor;
      stroke: none;
    }

    .handset-decline { transform: rotate(135deg); }
    .handset-accept { transform: rotate(-45deg); }

    .inactive {
      position: fixed;
      inset: 0;
      display: none;
      background: #000;
      z-index: 50;
    }

    .inactive.visible { display: block; }
  </style>
</head>

<body>
  <div class="call-screen" id="callScreen">
    <div class="status-bar">
      <div id="displayTime">10:47</div>
      <div class="status-right">
        <div class="signal-bars bars-4" id="signalBars"><span></span><span></span><span></span><span></span></div>
        <span id="signalText">5G</span>
        <span id="batteryPercent">43%</span>
        <div class="battery"><div class="battery-fill" id="batteryFill"></div></div>
      </div>
    </div>

    <main class="call-main">
      <div class="incoming-status" id="incomingStatus">
        <span id="incomingStatusText">Calling</span><span class="dots"><span>.</span><span>.</span><span>.</span></span>
      </div>
      <div class="avatar" id="avatar">J</div>
      <div class="caller-name" id="callerName">Jess</div>
      <div class="optional-status" id="callStatusText">Connected</div>
      <div class="call-timer" id="callTimer">00:00</div>
      <div class="declined-text hidden" id="declinedText">Call declined</div>
    </main>

    <footer class="call-footer" id="activeControls">
      <div class="control-row">
        <div class="control">
          <button class="control-circle" type="button">
            <svg class="control-icon speaker-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 9v6h4l5 4V5L8 9H4z"></path><path d="M16 8.5a5 5 0 0 1 0 7"></path><path d="M18.5 6a8.5 8.5 0 0 1 0 12"></path>
            </svg>
          </button>
          <div>Speaker</div>
        </div>
        <div class="control">
          <button class="control-circle incoming-circle hangup-circle" type="button" onclick="declineCall()">
            <svg class="control-icon handset-icon handset-decline" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6.6 10.8c1.7 3.3 3.3 4.9 6.6 6.6l2.2-2.2c.3-.3.8-.4 1.2-.3 1.3.4 2.6.6 4 .6.7 0 1.2.5 1.2 1.2V21c0 .7-.5 1.2-1.2 1.2C10.2 22.2 1.8 13.8 1.8 3.4 1.8 2.7 2.3 2.2 3 2.2h4.3c.7 0 1.2.5 1.2 1.2 0 1.4.2 2.7.6 4 .1.4 0 .9-.3 1.2l-2.2 2.2z"></path>
            </svg>
          </button>
          <div>&nbsp;</div>
        </div>
        <div class="control">
          <button class="control-circle" type="button">
            <svg class="control-icon mute-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3a3 3 0 0 0-3 3v5a3 3 0 0 0 5.1 2.1"></path><path d="M15 9.5V6a3 3 0 0 0-4.7-2.5"></path><path d="M5 10v1a7 7 0 0 0 10.4 6.1"></path><path d="M19 10v1a7 7 0 0 1-.9 3.4"></path><path d="M12 18v3"></path><path d="M8 21h8"></path><path d="M4 4l16 16"></path>
            </svg>
          </button>
          <div>Mute</div>
        </div>
      </div>
    </footer>

    <footer class="call-footer hidden" id="incomingControls">
      <div class="control-row incoming-row">
        <div class="control">
          <button class="control-circle incoming-circle hangup-circle" type="button" onclick="declineCall()">
            <svg class="control-icon handset-icon handset-decline" viewBox="0 0 24 24" aria-hidden="true"><path d="M6.6 10.8c1.7 3.3 3.3 4.9 6.6 6.6l2.2-2.2c.3-.3.8-.4 1.2-.3 1.3.4 2.6.6 4 .6.7 0 1.2.5 1.2 1.2V21c0 .7-.5 1.2-1.2 1.2C10.2 22.2 1.8 13.8 1.8 3.4 1.8 2.7 2.3 2.2 3 2.2h4.3c.7 0 1.2.5 1.2 1.2 0 1.4.2 2.7.6 4 .1.4 0 .9-.3 1.2l-2.2 2.2z"></path></svg>
          </button>
          <div>Decline</div>
        </div>
        <div class="control">
          <button class="control-circle incoming-circle accept-circle" type="button" onclick="acceptCall()">
            <svg class="control-icon handset-icon handset-accept" viewBox="0 0 24 24" aria-hidden="true"><path d="M6.6 10.8c1.7 3.3 3.3 4.9 6.6 6.6l2.2-2.2c.3-.3.8-.4 1.2-.3 1.3.4 2.6.6 4 .6.7 0 1.2.5 1.2 1.2V21c0 .7-.5 1.2-1.2 1.2C10.2 22.2 1.8 13.8 1.8 3.4 1.8 2.7 2.3 2.2 3 2.2h4.3c.7 0 1.2.5 1.2 1.2 0 1.4.2 2.7.6 4 .1.4 0 .9-.3 1.2l-2.2 2.2z"></path></svg>
          </button>
          <div>Accept</div>
        </div>
      </div>
    </footer>
  </div>

  <div class="inactive" id="inactiveScreen"></div>
  <audio id="ringtoneAudio" loop playsinline></audio>
  <script src="config.js"></script>

  <script>
    let timerBaseSeconds = 0;
    let timerStartedAt = Date.now();
    let displayTimeBaseMinutes = 0;
    let displayTimeStartedAt = 0;
    let hasInitialisedTimers = false;
    let currentState = "incoming";
    let locallyOverriddenState = false;
    let latestSettings = {};
    let lockedBlackAfterDecline = false;

    function apiUrl(action) {
      const url = new URL(API_URL);
      url.searchParams.set("action", action);
      return url.toString();
    }

    async function loadSettings() {
      try {
        const response = await fetch(apiUrl("getCallSettings"), { method: "GET", redirect: "follow" });
        const settings = await response.json();
        latestSettings = settings;
        applySettings(settings);
      } catch (error) {
        console.log("Call settings load error:", error);
      }
    }

    function applySettings(settings) {
      const sheetActive = settings["Active"] === true || String(settings["Active"]).toUpperCase() === "TRUE";
      const sheetState = normaliseState(settings["Call State"] || "incoming");

      if (lockedBlackAfterDecline) {
        if (sheetActive && sheetState === "incoming") {
          lockedBlackAfterDecline = false;
          locallyOverriddenState = false;
          currentState = "incoming";
          document.getElementById("inactiveScreen").classList.remove("visible");
        } else {
          return;
        }
      }

      const callScreen = document.getElementById("callScreen");
      const inactiveScreen = document.getElementById("inactiveScreen");

      if (!sheetActive) {
        callScreen.classList.remove("ready");
        inactiveScreen.classList.add("visible");
        stopRingtone();
        hasInitialisedTimers = false;
        locallyOverriddenState = false;
        return;
      }

      inactiveScreen.classList.remove("visible");

      if (!locallyOverriddenState) currentState = sheetState;

      document.title = (settings["Caller Name"] || "Call") + " Call";
      setText("callerName", settings["Caller Name"] || "Caller");
      setText("signalText", settings["Signal"] || "5G");
      setText("incomingStatusText", settings["Incoming Status Text"] || "Calling");

      const statusText = settings["Call Status Text"] || "";
      const statusEl = document.getElementById("callStatusText");
      if (statusText) {
        statusEl.textContent = statusText;
        statusEl.classList.add("visible");
      } else {
        statusEl.classList.remove("visible");
      }

      const battery = clamp(parseInt(settings["Battery %"] || "43", 10), 0, 100);
      setText("batteryPercent", battery + "%");
      document.getElementById("batteryFill").style.width = battery + "%";

      const signalBars = clamp(parseInt(settings["Signal Bars"] || "4", 10), 1, 4);
      document.getElementById("signalBars").className = "signal-bars bars-" + signalBars;

      setCssVar("--header-colour", settings["Header Colour"]);
      setCssVar("--middle-colour", settings["Middle Colour"]);
      setCssVar("--footer-colour", settings["Footer Colour"]);
      setCssVar("--text-colour", settings["Text Colour"]);
      setCssVar("--muted-text-colour", settings["Muted Text Colour"]);
      setCssVar("--avatar-colour", settings["Avatar Colour"]);
      setCssVar("--button-colour", settings["Button Colour"]);
      setCssVar("--accept-colour", settings["Accept Colour"]);
      setCssVar("--hangup-colour", settings["Hangup Colour"]);

      if (settings["Wallpaper Image URL"]) setCssVar("--wallpaper", `url("${settings["Wallpaper Image URL"]}")`);
      else setCssVar("--wallpaper", "none");

      applyAvatar(settings);
      initialiseDisplayTimeIfNeeded(settings);
      applyState(currentState, settings);
      callScreen.classList.add("ready");
    }

    function applyAvatar(settings) {
      const avatar = document.getElementById("avatar");
      if (settings["Caller Image URL"]) {
        avatar.textContent = "";
        avatar.style.backgroundImage = `url("${settings["Caller Image URL"]}")`;
      } else {
        avatar.style.backgroundImage = "";
        avatar.textContent = settings["Avatar Initials"] || initials(settings["Caller Name"]);
      }
    }

    function applyState(state, settings) {
      currentState = normaliseState(state);
      const incomingStatus = document.getElementById("incomingStatus");
      const activeControls = document.getElementById("activeControls");
      const incomingControls = document.getElementById("incomingControls");
      const callTimer = document.getElementById("callTimer");
      const declinedText = document.getElementById("declinedText");
      const callStatusText = document.getElementById("callStatusText");

      if (currentState === "incoming") {
        incomingStatus.classList.remove("hidden");
        incomingControls.classList.remove("hidden");
        activeControls.classList.add("hidden");
        callTimer.classList.add("hidden");
        declinedText.classList.add("hidden");
        callStatusText.classList.remove("visible");
        hasInitialisedTimers = false;
        startRingtone(settings);
        return;
      }

      if (currentState === "active") {
        incomingStatus.classList.add("hidden");
        incomingControls.classList.add("hidden");
        activeControls.classList.remove("hidden");
        callTimer.classList.remove("hidden");
        declinedText.classList.add("hidden");
        stopRingtone();
        initialiseCallTimerIfNeeded(settings);
        return;
      }

      if (currentState === "declined") {
        incomingStatus.classList.add("hidden");
        incomingControls.classList.add("hidden");
        activeControls.classList.add("hidden");
        callTimer.classList.add("hidden");
        declinedText.classList.remove("hidden");
        callStatusText.classList.remove("visible");
        stopRingtone();
        hasInitialisedTimers = false;
      }
    }

    function acceptCall() {
      locallyOverriddenState = true;
      currentState = "active";
      timerBaseSeconds = parseTimerToSeconds(latestSettings["Call Timer"] || "00:00");
      timerStartedAt = Date.now();
      hasInitialisedTimers = true;
      applyState("active", latestSettings);
      updateLiveClocks();
    }

    function declineCall() {
      locallyOverriddenState = true;
      currentState = "declined";
      applyState("declined", latestSettings);
      const timeoutSeconds = parseFloat(latestSettings["Decline Timeout Seconds"] || "3");
      const safeTimeout = isNaN(timeoutSeconds) ? 3 : Math.max(0, timeoutSeconds);
      setTimeout(() => {
        lockedBlackAfterDecline = true;
        stopRingtone();
        document.getElementById("callScreen").classList.remove("ready");
        document.getElementById("inactiveScreen").classList.add("visible");
      }, safeTimeout * 1000);
    }

    function normaliseState(state) {
      state = String(state || "").toLowerCase().trim();
      if (state === "active") return "active";
      if (state === "declined") return "declined";
      return "incoming";
    }

    function startRingtone(settings) {
      const url = settings["Ringtone Audio URL"] || "";
      const audio = document.getElementById("ringtoneAudio");
      if (!url) return;
      if (audio.src !== url) audio.src = url;
      audio.play().catch(error => console.log("Ringtone play blocked or failed:", error));
    }

    function stopRingtone() {
      const audio = document.getElementById("ringtoneAudio");
      audio.pause();
      audio.currentTime = 0;
    }

    function initialiseCallTimerIfNeeded(settings) {
      if (hasInitialisedTimers) return;
      timerBaseSeconds = parseTimerToSeconds(settings["Call Timer"] || "00:00");
      timerStartedAt = Date.now();
      hasInitialisedTimers = true;
      updateLiveClocks();
    }

    function initialiseDisplayTimeIfNeeded(settings) {
      if (displayTimeStartedAt) return;
      displayTimeBaseMinutes = parseClockToMinutes(settings["Display Time"] || "10:47");
      displayTimeStartedAt = Date.now();
    }

    function updateLiveClocks() {
      if (hasInitialisedTimers && currentState === "active") {
        const elapsedSeconds = Math.floor((Date.now() - timerStartedAt) / 1000);
        setText("callTimer", formatTimer(timerBaseSeconds + elapsedSeconds));
      }
      if (displayTimeStartedAt) {
        const elapsedMinutes = Math.floor((Date.now() - displayTimeStartedAt) / 60000);
        setText("displayTime", formatClockMinutes(displayTimeBaseMinutes + elapsedMinutes));
      }
    }

    function parseTimerToSeconds(text) {
      const parts = String(text || "0").split(":").map(Number).filter(number => !isNaN(number));
      if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
      if (parts.length === 2) return parts[0] * 60 + parts[1];
      if (parts.length === 1) return parts[0];
      return 0;
    }

    function formatTimer(totalSeconds) {
      totalSeconds = Math.max(0, totalSeconds);
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      if (hours > 0) return String(hours).padStart(2, "0") + ":" + String(minutes).padStart(2, "0") + ":" + String(seconds).padStart(2, "0");
      return String(minutes).padStart(2, "0") + ":" + String(seconds).padStart(2, "0");
    }

    function parseClockToMinutes(text) {
      const match = String(text || "").match(/^(\d{1,2}):(\d{2})$/);
      if (!match) return 0;
      return parseInt(match[1], 10) * 60 + parseInt(match[2], 10);
    }

    function formatClockMinutes(totalMinutes) {
      const minutesInDay = 24 * 60;
      const wrapped = ((totalMinutes % minutesInDay) + minutesInDay) % minutesInDay;
      const hours = Math.floor(wrapped / 60);
      const minutes = wrapped % 60;
      return String(hours).padStart(2, "0") + ":" + String(minutes).padStart(2, "0");
    }

    function setText(id, text) { document.getElementById(id).textContent = text; }
    function setCssVar(name, value) { if (value) document.documentElement.style.setProperty(name, value); }
    function clamp(value, min, max) { if (isNaN(value)) return min; return Math.max(min, Math.min(max, value)); }
    function initials(name) {
      if (!name) return "?";
      return String(name).split(/\s+/).filter(Boolean).slice(0, 2).map(part => part[0].toUpperCase()).join("");
    }

    loadSettings();
    setInterval(loadSettings, 1000);
    setInterval(updateLiveClocks, 250);
  </script>
</body>
</html>
