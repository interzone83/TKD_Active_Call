<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <!--
    activecall.html - Integrated Generic Call Screen v5.1
    ---------------------------------------------------
    Single HTML file for all call states:
      - incoming
      - outgoing
      - active
      - declined

    GitHub-side only.
    No Apps Script change required, assuming your existing API already returns
    all Setting / Value rows from the Call Settings sheet.

    Key behaviour:
      Call State = incoming:
        Incoming call screen with Decline / Accept buttons.

      Call State = outgoing:
        Outgoing call screen with "Calling..." and one End button.
        Timer is hidden and NOT running.

      Call State = active:
        Active call screen with running timer.
        Uses active controls: Speaker / End / Mute.

      Call State = declined:
        Shows call declined / ended state briefly, then black.

    Remote reset:
      After a local decline/end blackout, the page keeps polling.
      It wakes again when sheet says:
        Active = TRUE
        Call State = incoming / outgoing / active

    Fast polling:
      Sheet settings are polled every 500ms.
      Display time and call timer changes from the sheet are detected and updated.
  -->

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  >

  <title>Call</title>

  <style>
    /* ============================================================
       1. RESET / BASE
       ============================================================ */

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #05070a;
      font-family: Arial, Roboto, Helvetica, sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    .call-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      background:
        var(--wallpaper, none),
        radial-gradient(circle at 50% 6%, rgba(58, 92, 130, 0.42), transparent 34%),
        linear-gradient(
          180deg,
          var(--header-colour, #101923) 0%,
          var(--middle-colour, #111922) 48%,
          var(--footer-colour, #080d12) 100%
        );
      background-size: cover;
      background-position: center;
      color: var(--text-colour, #f4f7fb);
      opacity: 0;
    }

    .call-screen.ready {
      opacity: 1;
    }

    .hidden {
      display: none !important;
    }

    /* ============================================================
       2. TOP STATUS BAR
       ============================================================ */

    .status-bar {
      padding: calc(8px + env(safe-area-inset-top)) 18px 7px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1px;
      color: rgba(244, 247, 251, 0.92);
    }

    .status-right {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .signal-bars {
      display: flex;
      align-items: end;
      gap: 2px;
      height: 11px;
    }

    .signal-bars span {
      width: 3px;
      background: currentColor;
      border-radius: 2px;
      opacity: 0.28;
    }

    .signal-bars span:nth-child(1) { height: 3px; }
    .signal-bars span:nth-child(2) { height: 6px; }
    .signal-bars span:nth-child(3) { height: 8px; }
    .signal-bars span:nth-child(4) { height: 11px; }

    .signal-bars.bars-1 span:nth-child(-n+1),
    .signal-bars.bars-2 span:nth-child(-n+2),
    .signal-bars.bars-3 span:nth-child(-n+3),
    .signal-bars.bars-4 span:nth-child(-n+4) {
      opacity: 1;
    }

    .battery {
      width: 24px;
      height: 11px;
      border: 1.6px solid currentColor;
      border-radius: 3px;
      position: relative;
      overflow: hidden;
    }

    .battery::after {
      content: "";
      position: absolute;
      right: -4px;
      top: 3px;
      width: 3px;
      height: 5px;
      background: currentColor;
      border-radius: 0 2px 2px 0;
    }

    .battery-fill {
      height: 100%;
      width: 43%;
      background: currentColor;
    }

    .status-bar::after {
      content: "Voice call";
      position: absolute;
      top: calc(34px + env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(244, 247, 251, 0.46);
      pointer-events: none;
    }

    /* ============================================================
       3. CALLER AREA
       ============================================================ */

    .call-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 42px 18px 92px;
      text-align: center;
    }

    .call-state-text {
      font-size: 22px;
      color: var(--muted-text-colour, #aeb8c5);
      margin-bottom: 28px;
      height: 30px;
      letter-spacing: 0.02em;
      font-weight: 600;
    }

    .dots span {
      opacity: 0.25;
      animation: pulseDot 1.2s infinite;
      font-weight: 800;
    }

    .dots span:nth-child(2) { animation-delay: 0.18s; }
    .dots span:nth-child(3) { animation-delay: 0.36s; }

    @keyframes pulseDot {
      0%, 100% { opacity: 0.25; }
      45% { opacity: 1; }
    }

    .avatar {
      width: 128px;
      height: 128px;
      border-radius: 28px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.12), rgba(255,255,255,0.02)),
        var(--avatar-colour, #2d3a48);
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 46px;
      font-weight: 700;
      margin-bottom: 24px;
      box-shadow:
        0 18px 48px rgba(0,0,0,0.34),
        inset 0 0 0 1px rgba(255,255,255,0.10);
    }

    .caller-name {
      font-size: 31px;
      font-weight: 800;
      margin-bottom: 9px;
      letter-spacing: -0.02em;
    }

    .call-timer {
      font-size: 18px;
      color: var(--muted-text-colour, #aeb8c5);
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .ended-text {
      font-size: 17px;
      color: var(--muted-text-colour, #aeb8c5);
      margin-top: 9px;
      font-weight: 700;
    }

    /* ============================================================
       4. FOOTER / BUTTONS
       ============================================================ */

    .call-footer {
      padding: 16px 20px calc(28px + env(safe-area-inset-bottom));
      background: rgba(5, 9, 13, 0.54);
      border-top: 1px solid rgba(255,255,255,0.07);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .control-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      align-items: end;
      gap: 12px;
      max-width: 460px;
      margin: 0 auto;
    }

    .incoming-row {
      grid-template-columns: 1fr 1fr;
      max-width: 330px;
      gap: 34px;
    }

    .single-control-row {
      display: flex;
      justify-content: center;
      align-items: center;
      max-width: 460px;
      margin: 0 auto;
    }

    .control {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--text-colour, #f4f7fb);
      font-size: 12px;
      font-weight: 800;
      min-width: 0;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .control-circle {
      width: 66px;
      height: 56px;
      border-radius: 18px;
      background: var(--button-colour, #26313d);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      box-shadow:
        0 8px 22px rgba(0,0,0,0.24),
        inset 0 0 0 1px rgba(255,255,255,0.08);
      border: none;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .big-control {
      width: 78px;
      height: 62px;
      border-radius: 20px;
    }

    .end-button {
      width: 94px;
      height: 62px;
      border-radius: 20px;
    }

    .hangup-circle {
      background: var(--hangup-colour, #D83B36);
    }

    .accept-circle {
      background: var(--accept-colour, #168D5A);
    }

    .control-icon {
      width: 28px;
      height: 28px;
      display: block;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.45;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .speaker-icon,
    .mute-icon {
      width: 29px;
      height: 29px;
    }

    .handset-icon {
      width: 31px;
      height: 31px;
      fill: currentColor;
      stroke: none;
    }

    .handset-decline,
    .handset-end {
      transform: rotate(135deg);
    }

    .handset-accept {
      transform: rotate(-45deg);
    }

    /* ============================================================
       5. BLACK / INACTIVE SCREEN
       ============================================================ */

    .inactive {
      position: fixed;
      inset: 0;
      display: none;
      background: #000;
      z-index: 50;
    }

    .inactive.visible {
      display: block;
    }
  </style>
</head>

<body>
  <div class="call-screen" id="callScreen">
    <!-- Status bar -->
    <div class="status-bar">
      <div id="displayTime">10:47</div>

      <div class="status-right">
        <div class="signal-bars bars-4" id="signalBars">
          <span></span><span></span><span></span><span></span>
        </div>

        <span id="signalText">5G</span>
        <span id="batteryPercent">43%</span>

        <div class="battery">
          <div class="battery-fill" id="batteryFill"></div>
        </div>
      </div>
    </div>

    <!-- Caller area -->
    <main class="call-main">
      <div class="call-state-text" id="callStateText">
        <span id="stateLabel">Calling</span><span class="dots" id="stateDots"><span>.</span><span>.</span><span>.</span></span>
      </div>

      <div class="avatar" id="avatar">J</div>
      <div class="caller-name" id="callerName">Jess</div>
      <div class="call-timer hidden" id="callTimer">00:00</div>
      <div class="ended-text hidden" id="endedText">Call ended</div>
    </main>

    <!-- Incoming controls -->
    <footer class="call-footer hidden" id="incomingControls">
      <div class="control-row incoming-row">
        <div class="control">
          <button class="control-circle big-control hangup-circle" type="button" onclick="declineCall()">
            <svg class="handset-icon handset-decline" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6.6 10.8c1.7 3.3 3.3 4.9 6.6 6.6l2.2-2.2c.3-.3.8-.4 1.2-.3 1.3.4 2.6.6 4 .6.7 0 1.2.5 1.2 1.2V21c0 .7-.5 1.2-1.2 1.2C10.2 22.2 1.8 13.8 1.8 3.4 1.8 2.7 2.3 2.2 3 2.2h4.3c.7 0 1.2.5 1.2 1.2 0 1.4.2 2.7.6 4 .1.4 0 .9-.3 1.2l-2.2 2.2z"></path>
            </svg>
          </button>
          <div>Decline</div>
        </div>

        <div class="control">
          <button class="control-circle big-control accept-circle" type="button" onclick="acceptCall()">
            <svg class="handset-icon handset-accept" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6.6 10.8c1.7 3.3 3.3 4.9 6.6 6.6l2.2-2.2c.3-.3.8-.4 1.2-.3 1.3.4 2.6.6 4 .6.7 0 1.2.5 1.2 1.2V21c0 .7-.5 1.2-1.2 1.2C10.2 22.2 1.8 13.8 1.8 3.4 1.8 2.7 2.3 2.2 3 2.2h4.3c.7 0 1.2.5 1.2 1.2 0 1.4.2 2.7.6 4 .1.4 0 .9-.3 1.2l-2.2 2.2z"></path>
            </svg>
          </button>
          <div>Accept</div>
        </div>
      </div>
    </footer>

    <!-- Outgoing controls -->
    <footer class="call-footer hidden" id="outgoingControls">
      <div class="single-control-row">
        <div class="control">
          <button class="control-circle end-button hangup-circle" type="button" onclick="endCall()">
            <svg class="handset-icon handset-end" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6.6 10.8c1.7 3.3 3.3 4.9 6.6 6.6l2.2-2.2c.3-.3.8-.4 1.2-.3 1.3.4 2.6.6 4 .6.7 0 1.2.5 1.2 1.2V21c0 .7-.5 1.2-1.2 1.2C10.2 22.2 1.8 13.8 1.8 3.4 1.8 2.7 2.3 2.2 3 2.2h4.3c.7 0 1.2.5 1.2 1.2 0 1.4.2 2.7.6 4 .1.4 0 .9-.3 1.2l-2.2 2.2z"></path>
            </svg>
          </button>
          <div>End</div>
        </div>
      </div>
    </footer>

    <!-- Active controls -->
    <footer class="call-footer hidden" id="activeControls">
      <div class="control-row">
        <div class="control">
          <button class="control-circle" type="button">
            <svg class="control-icon speaker-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 9v6h4l5 4V5L8 9H4z"></path>
              <path d="M16 8.5a5 5 0 0 1 0 7"></path>
              <path d="M18.5 6a8.5 8.5 0 0 1 0 12"></path>
            </svg>
          </button>
          <div>Speaker</div>
        </div>

        <div class="control">
          <button class="control-circle big-control hangup-circle" type="button" onclick="endCall()">
            <svg class="handset-icon handset-end" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6.6 10.8c1.7 3.3 3.3 4.9 6.6 6.6l2.2-2.2c.3-.3.8-.4 1.2-.3 1.3.4 2.6.6 4 .6.7 0 1.2.5 1.2 1.2V21c0 .7-.5 1.2-1.2 1.2C10.2 22.2 1.8 13.8 1.8 3.4 1.8 2.7 2.3 2.2 3 2.2h4.3c.7 0 1.2.5 1.2 1.2 0 1.4.2 2.7.6 4 .1.4 0 .9-.3 1.2l-2.2 2.2z"></path>
            </svg>
          </button>
          <div>&nbsp;</div>
        </div>

        <div class="control">
          <button class="control-circle" type="button">
            <svg class="control-icon mute-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3a3 3 0 0 0-3 3v5a3 3 0 0 0 5.1 2.1"></path>
              <path d="M15 9.5V6a3 3 0 0 0-4.7-2.5"></path>
              <path d="M5 10v1a7 7 0 0 0 10.4 6.1"></path>
              <path d="M19 10v1a7 7 0 0 1-.9 3.4"></path>
              <path d="M12 18v3"></path>
              <path d="M8 21h8"></path>
              <path d="M4 4l16 16"></path>
            </svg>
          </button>
          <div>Mute</div>
        </div>
      </div>
    </footer>
  </div>

  <div class="inactive" id="inactiveScreen"></div>
  <audio id="ringtoneAudio" loop playsinline></audio>

  <script src="config.js"></script>

  <script>
    /* ============================================================
       1. LOCAL STATE
       ============================================================ */

    let latestSettings = {};
    let currentState = "incoming";
    let previousSheetState = "";
    let locallyOverriddenState = false;

    let lockedBlackAfterEnd = false;
    let sawInactiveAfterBlack = false;

    let callTimerInitialised = false;
    let callTimerBaseSeconds = 0;
    let callTimerStartedAt = Date.now();
    let lastSheetCallTimer = "";

    let displayTimeBaseMinutes = 0;
    let displayTimeStartedAt = 0;
    let lastSheetDisplayTime = "";

    /* ============================================================
       2. API
       ============================================================ */

    function apiUrl() {
      const url = new URL(API_URL);
      url.searchParams.set("action", "getCallSettings");
      return url.toString();
    }

    async function loadSettings() {
      try {
        const response = await fetch(apiUrl(), {
          method: "GET",
          redirect: "follow"
        });

        const settings = await response.json();
        latestSettings = settings;
        applySettings(settings);

      } catch (error) {
        console.log("Call settings load error:", error);
      }
    }

    /* ============================================================
       3. APPLY SETTINGS
       ============================================================ */

    function applySettings(settings) {
      const sheetActive =
        settings["Active"] === true ||
        String(settings["Active"]).toUpperCase() === "TRUE";

      const sheetState = normaliseState(settings["Call State"] || "incoming");

      /*
        BLACK SCREEN RESET
        ------------------------------------------------------------
        After decline/end, the screen stays black.

        To wake it remotely:
          1. Set Active = FALSE
          2. Set Call State to incoming / outgoing / active
          3. Set Active = TRUE

        This avoids the screen instantly waking again just because the
        sheet was still Active = TRUE after pressing End.
      */
      if (lockedBlackAfterEnd) {
        if (!sheetActive) {
          sawInactiveAfterBlack = true;
          return;
        }

        if (sawInactiveAfterBlack && sheetActive && ["incoming", "outgoing", "active"].includes(sheetState)) {
          lockedBlackAfterEnd = false;
          sawInactiveAfterBlack = false;
          locallyOverriddenState = false;
          currentState = sheetState;
          resetCallTimer();

          document.getElementById("inactiveScreen").classList.remove("visible");
          document.getElementById("callScreen").classList.add("ready");
        } else {
          return;
        }
      }

      const callScreen = document.getElementById("callScreen");
      const inactiveScreen = document.getElementById("inactiveScreen");

      if (!sheetActive) {
        callScreen.classList.remove("ready");
        inactiveScreen.classList.add("visible");
        stopRingtone();
        locallyOverriddenState = false;
        resetCallTimer();
        previousSheetState = "";
        return;
      }

      inactiveScreen.classList.remove("visible");

      if (!locallyOverriddenState) {
        currentState = sheetState;
      }

      document.title = (settings["Caller Name"] || "Call") + " Call";

      applyVisualSettings(settings);
      applyAvatar(settings);
      updateDisplayTimeFromSheet(settings);
      applyState(currentState, settings);

      previousSheetState = sheetState;
      callScreen.classList.add("ready");
    }

    function applyVisualSettings(settings) {
      setText("callerName", settings["Caller Name"] || "Caller");
      setText("signalText", settings["Signal"] || "5G");

      const battery = clamp(parseInt(settings["Battery %"] || "43", 10), 0, 100);
      setText("batteryPercent", battery + "%");
      document.getElementById("batteryFill").style.width = battery + "%";

      const signalBars = clamp(parseInt(settings["Signal Bars"] || "4", 10), 1, 4);
      document.getElementById("signalBars").className = "signal-bars bars-" + signalBars;

      setCssVar("--header-colour", settings["Header Colour"]);
      setCssVar("--middle-colour", settings["Middle Colour"]);
      setCssVar("--footer-colour", settings["Footer Colour"]);
      setCssVar("--text-colour", settings["Text Colour"]);
      setCssVar("--muted-text-colour", settings["Muted Text Colour"]);
      setCssVar("--avatar-colour", settings["Avatar Colour"]);
      setCssVar("--button-colour", settings["Button Colour"]);
      setCssVar("--accept-colour", settings["Accept Colour"]);
      setCssVar("--hangup-colour", settings["Hangup Colour"]);

      if (settings["Wallpaper Image URL"]) {
        setCssVar("--wallpaper", `url("${settings["Wallpaper Image URL"]}")`);
      } else {
        setCssVar("--wallpaper", "none");
      }
    }

    function applyAvatar(settings) {
      const avatar = document.getElementById("avatar");

      if (settings["Caller Image URL"]) {
        avatar.textContent = "";
        avatar.style.backgroundImage = `url("${settings["Caller Image URL"]}")`;
      } else {
        avatar.style.backgroundImage = "";
        avatar.textContent = settings["Avatar Initials"] || initials(settings["Caller Name"]);
      }
    }

    /* ============================================================
       4. STATE HANDLING
       ============================================================ */

    function applyState(state, settings) {
      currentState = normaliseState(state);

      hideAllControls();
      document.getElementById("endedText").classList.add("hidden");
      document.getElementById("callStateText").classList.remove("hidden");

      if (currentState === "incoming") {
        setText("stateLabel", settings["Incoming Status Text"] || "Calling");
        document.getElementById("stateDots").classList.remove("hidden");
        document.getElementById("callTimer").classList.add("hidden");
        document.getElementById("incomingControls").classList.remove("hidden");

        resetCallTimer();
        startRingtone(settings);
        return;
      }

      if (currentState === "outgoing") {
        setText("stateLabel", settings["Outgoing Status Text"] || settings["Incoming Status Text"] || "Calling");
        document.getElementById("stateDots").classList.remove("hidden");
        document.getElementById("callTimer").classList.add("hidden");
        document.getElementById("outgoingControls").classList.remove("hidden");

        resetCallTimer();
        stopRingtone();
        return;
      }

      if (currentState === "active") {
        setText("stateLabel", settings["Call Status Text"] || "Connected");
        document.getElementById("stateDots").classList.add("hidden");
        document.getElementById("callTimer").classList.remove("hidden");
        document.getElementById("activeControls").classList.remove("hidden");

        stopRingtone();
        updateCallTimerFromSheet(settings);
        return;
      }

      if (currentState === "declined") {
        showEndedState("Call declined");
      }
    }

    function hideAllControls() {
      document.getElementById("incomingControls").classList.add("hidden");
      document.getElementById("outgoingControls").classList.add("hidden");
      document.getElementById("activeControls").classList.add("hidden");
    }

    function acceptCall() {
      locallyOverriddenState = true;
      currentState = "active";
      resetCallTimer();
      applyState("active", latestSettings);
    }

    function declineCall() {
      locallyOverriddenState = true;
      showEndedState("Call declined");
      goBlackAfterTimeout();
    }

    function endCall() {
      locallyOverriddenState = true;
      showEndedState("Call ended");
      goBlackAfterTimeout();
    }

    function showEndedState(text) {
      hideAllControls();
      stopRingtone();
      resetCallTimer();

      document.getElementById("callStateText").classList.add("hidden");
      document.getElementById("callTimer").classList.add("hidden");
      document.getElementById("endedText").textContent = text;
      document.getElementById("endedText").classList.remove("hidden");
    }

    function goBlackAfterTimeout() {
      const timeoutSeconds = parseFloat(latestSettings["Decline Timeout Seconds"] || "3");
      const safeTimeout = isNaN(timeoutSeconds) ? 3 : Math.max(0, timeoutSeconds);

      setTimeout(() => {
        lockedBlackAfterEnd = true;
        sawInactiveAfterBlack = false;
        stopRingtone();
        document.getElementById("callScreen").classList.remove("ready");
        document.getElementById("inactiveScreen").classList.add("visible");
      }, safeTimeout * 1000);
    }

    function normaliseState(state) {
      state = String(state || "").toLowerCase().trim();

      if (state === "outgoing") return "outgoing";
      if (state === "active") return "active";
      if (state === "declined") return "declined";

      return "incoming";
    }

    /* ============================================================
       5. TIMER / SHEET REFRESH LOGIC
       ------------------------------------------------------------
       Display Time and Call Timer are checked from the sheet often.
       If you change either in the sheet, the page updates quickly.
       ============================================================ */

    function updateCallTimerFromSheet(settings) {
      const sheetTimer = String(settings["Call Timer"] || "00:00").trim();

      if (!callTimerInitialised || sheetTimer !== lastSheetCallTimer || previousSheetState !== "active") {
        callTimerBaseSeconds = parseTimerToSeconds(sheetTimer);
        callTimerStartedAt = Date.now();
        callTimerInitialised = true;
        lastSheetCallTimer = sheetTimer;
      }

      updateLiveClocks();
    }

    function resetCallTimer() {
      callTimerInitialised = false;
      callTimerBaseSeconds = 0;
      callTimerStartedAt = Date.now();
      lastSheetCallTimer = "";
      setText("callTimer", "00:00");
    }

    function updateDisplayTimeFromSheet(settings) {
      const sheetDisplayTime = String(settings["Display Time"] || "10:47").trim();

      if (!displayTimeStartedAt || sheetDisplayTime !== lastSheetDisplayTime) {
        displayTimeBaseMinutes = parseClockToMinutes(sheetDisplayTime);
        displayTimeStartedAt = Date.now();
        lastSheetDisplayTime = sheetDisplayTime;
      }

      updateLiveClocks();
    }

    function updateLiveClocks() {
      if (callTimerInitialised && currentState === "active") {
        const elapsedSeconds = Math.floor((Date.now() - callTimerStartedAt) / 1000);
        setText("callTimer", formatTimer(callTimerBaseSeconds + elapsedSeconds));
      }

      if (displayTimeStartedAt) {
        const elapsedMinutes = Math.floor((Date.now() - displayTimeStartedAt) / 60000);
        setText("displayTime", formatClockMinutes(displayTimeBaseMinutes + elapsedMinutes));
      }
    }

    /* ============================================================
       6. RINGTONE
       ============================================================ */

    function startRingtone(settings) {
      const url = settings["Ringtone Audio URL"] || "";
      const audio = document.getElementById("ringtoneAudio");

      if (!url) return;

      if (audio.src !== url) {
        audio.src = url;
      }

      audio.play().catch(error => {
        console.log("Ringtone play blocked or failed:", error);
      });
    }

    function stopRingtone() {
      const audio = document.getElementById("ringtoneAudio");
      audio.pause();
      audio.currentTime = 0;
    }

    /* ============================================================
       7. FORMATTERS / HELPERS
       ============================================================ */

    function parseTimerToSeconds(text) {
      const parts = String(text || "0")
        .split(":")
        .map(Number)
        .filter(number => !isNaN(number));

      if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
      if (parts.length === 2) return parts[0] * 60 + parts[1];
      if (parts.length === 1) return parts[0];

      return 0;
    }

    function formatTimer(totalSeconds) {
      totalSeconds = Math.max(0, totalSeconds);

      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      if (hours > 0) {
        return (
          String(hours).padStart(2, "0") + ":" +
          String(minutes).padStart(2, "0") + ":" +
          String(seconds).padStart(2, "0")
        );
      }

      return (
        String(minutes).padStart(2, "0") + ":" +
        String(seconds).padStart(2, "0")
      );
    }

    function parseClockToMinutes(text) {
      const match = String(text || "").match(/^(\d{1,2}):(\d{2})$/);
      if (!match) return 0;
      return parseInt(match[1], 10) * 60 + parseInt(match[2], 10);
    }

    function formatClockMinutes(totalMinutes) {
      const minutesInDay = 24 * 60;
      const wrapped = ((totalMinutes % minutesInDay) + minutesInDay) % minutesInDay;
      const hours = Math.floor(wrapped / 60);
      const minutes = wrapped % 60;
      return String(hours).padStart(2, "0") + ":" + String(minutes).padStart(2, "0");
    }

    function setText(id, text) {
      document.getElementById(id).textContent = text;
    }

    function setCssVar(name, value) {
      if (value) document.documentElement.style.setProperty(name, value);
    }

    function clamp(value, min, max) {
      if (isNaN(value)) return min;
      return Math.max(min, Math.min(max, value));
    }

    function initials(name) {
      if (!name) return "?";

      return String(name)
        .split(/\\s+/)
        .filter(Boolean)
        .slice(0, 2)
        .map(part => part[0].toUpperCase())
        .join("");
    }

    /* ============================================================
       8. STARTUP
       ============================================================ */

    loadSettings();

    // Fast polling like the home screen. Increase to 500 or 1000ms if you need
    // to reduce Google Apps Script traffic.
    setInterval(loadSettings, 350);

    // Smooth local clocks.
    setInterval(updateLiveClocks, 250);
  </script>
</body>
