<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  >
  <title>Active Call</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    .call-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      background:
        var(--wallpaper, none),
        linear-gradient(
          180deg,
          var(--header-colour, #101010) 0%,
          var(--middle-colour, #151515) 42%,
          var(--footer-colour, #101010) 100%
        );
      background-size: cover;
      background-position: center;
      color: var(--text-colour, #ffffff);
      opacity: 0;
    }

    .call-screen.ready {
      opacity: 1;
    }

    .status-bar {
      padding: calc(8px + env(safe-area-inset-top)) 18px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.1px;
    }

    .status-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .signal-bars {
      display: flex;
      align-items: end;
      gap: 2px;
      height: 13px;
    }

    .signal-bars span {
      width: 3px;
      background: currentColor;
      border-radius: 2px;
      opacity: 0.28;
    }

    .signal-bars span:nth-child(1) { height: 4px; }
    .signal-bars span:nth-child(2) { height: 7px; }
    .signal-bars span:nth-child(3) { height: 10px; }
    .signal-bars span:nth-child(4) { height: 13px; }

    .signal-bars.bars-1 span:nth-child(-n+1),
    .signal-bars.bars-2 span:nth-child(-n+2),
    .signal-bars.bars-3 span:nth-child(-n+3),
    .signal-bars.bars-4 span:nth-child(-n+4) {
      opacity: 1;
    }

    .battery {
      width: 28px;
      height: 13px;
      border: 1.8px solid currentColor;
      border-radius: 3px;
      position: relative;
      overflow: hidden;
    }

    .battery::after {
      content: "";
      position: absolute;
      right: -4px;
      top: 3px;
      width: 3px;
      height: 6px;
      background: currentColor;
      border-radius: 0 2px 2px 0;
    }

    .battery-fill {
      height: 100%;
      width: 43%;
      background: currentColor;
    }

    .call-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 18px 18px 80px;
      text-align: center;
    }

    .avatar {
      width: 138px;
      height: 138px;
      border-radius: 50%;
      background: var(--avatar-colour, #333333);
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 500;
      margin-bottom: 28px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    }

    .caller-name {
      font-size: 34px;
      font-weight: 700;
      margin-bottom: 9px;
    }

    .optional-status {
      font-size: 16px;
      color: var(--muted-text-colour, #b8b8b8);
      margin-bottom: 4px;
      display: none;
    }

    .optional-status.visible {
      display: block;
    }

    .call-timer {
      font-size: 18px;
      color: var(--muted-text-colour, #b8b8b8);
      font-weight: 500;
    }

    .call-footer {
      padding: 18px 24px calc(34px + env(safe-area-inset-bottom));
      background: rgba(0,0,0,0.02);
    }

    .control-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      align-items: end;
      gap: 18px;
      max-width: 460px;
      margin: 0 auto;
    }

    .control {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 9px;
      color: var(--text-colour, #ffffff);
      font-size: 13px;
      font-weight: 500;
      min-width: 0;
    }

    .control-circle {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: var(--button-colour, #2b2b2b);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      position: relative;
      box-shadow: 0 6px 20px rgba(0,0,0,0.18);
    }

    .control-circle.hangup-circle {
      width: 68px;
      height: 68px;
      background: var(--hangup-colour, #ff3b30);
    }

    .icon-speaker {
      width: 26px;
      height: 22px;
      position: relative;
    }

    .icon-speaker::before {
      content: "";
      position: absolute;
      left: 2px;
      top: 6px;
      width: 8px;
      height: 10px;
      background: white;
      border-radius: 2px;
    }

    .icon-speaker::after {
      content: "";
      position: absolute;
      left: 9px;
      top: 3px;
      width: 12px;
      height: 16px;
      border: 3px solid white;
      border-left: none;
      border-radius: 0 14px 14px 0;
    }

    .icon-mute {
      width: 24px;
      height: 28px;
      position: relative;
    }

    .icon-mute::before {
      content: "";
      position: absolute;
      left: 8px;
      top: 2px;
      width: 8px;
      height: 15px;
      border: 3px solid white;
      border-radius: 8px;
    }

    .icon-mute::after {
      content: "";
      position: absolute;
      left: 3px;
      top: 17px;
      width: 18px;
      height: 9px;
      border-bottom: 3px solid white;
      border-radius: 0 0 12px 12px;
    }

    .icon-mute .slash {
      position: absolute;
      width: 31px;
      height: 3px;
      background: white;
      left: -4px;
      top: 13px;
      transform: rotate(-42deg);
      border-radius: 2px;
    }

    .icon-handset {
      width: 32px;
      height: 32px;
      position: relative;
      transform: rotate(135deg);
    }

    .icon-handset::before {
      content: "";
      position: absolute;
      left: 4px;
      top: 8px;
      width: 23px;
      height: 13px;
      border: 5px solid white;
      border-top: none;
      border-radius: 0 0 18px 18px;
    }

    .icon-handset::after {
      content: "";
      position: absolute;
      left: 0px;
      top: 15px;
      width: 32px;
      height: 8px;
      border-radius: 8px;
      background: white;
    }

    .inactive {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #666;
      font-size: 14px;
    }

    .inactive.visible {
      display: flex;
    }
  </style>
</head>

<body>
  <div class="call-screen" id="callScreen">
    <div class="status-bar">
      <div id="displayTime">10:47</div>

      <div class="status-right">
        <div class="signal-bars bars-4" id="signalBars">
          <span></span><span></span><span></span><span></span>
        </div>
        <span id="signalText">5G</span>
        <span id="batteryPercent">43%</span>
        <div class="battery">
          <div class="battery-fill" id="batteryFill"></div>
        </div>
      </div>
    </div>

    <main class="call-main">
      <div class="avatar" id="avatar">J</div>
      <div class="caller-name" id="callerName">Jess</div>
      <div class="optional-status" id="callStatusText">Calling…</div>
      <div class="call-timer" id="callTimer">00:47</div>
    </main>

    <footer class="call-footer">
      <div class="control-row">
        <div class="control">
          <div class="control-circle">
            <span class="icon-speaker"></span>
          </div>
          <div>Speaker</div>
        </div>

        <div class="control">
          <div class="control-circle hangup-circle">
            <span class="icon-handset"></span>
          </div>
          <div>&nbsp;</div>
        </div>

        <div class="control">
          <div class="control-circle">
            <span class="icon-mute"><span class="slash"></span></span>
          </div>
          <div>Mute</div>
        </div>
      </div>
    </footer>
  </div>

  <div class="inactive" id="inactiveScreen">Call screen inactive</div>

  <script src="config.js"></script>

  <script>
    let timerBaseSeconds = 0;
    let timerStartedAt = Date.now();
    let displayTimeBaseMinutes = 0;
    let displayTimeStartedAt = Date.now();
    let hasInitialisedTimers = false;

    function apiUrl(action) {
      const url = new URL(API_URL);
      url.searchParams.set("action", action);
      return url.toString();
    }

    async function loadSettings() {
      try {
        const response = await fetch(apiUrl("getActiveCallSettings"), {
          method: "GET",
          redirect: "follow"
        });
        const settings = await response.json();
        applySettings(settings);
      } catch (error) {
        console.log("Active call load error:", error);
      }
    }

    function applySettings(settings) {
      const active =
        settings["Active"] === true ||
        String(settings["Active"]).toUpperCase() === "TRUE";

      const callScreen = document.getElementById("callScreen");
      const inactiveScreen = document.getElementById("inactiveScreen");

      if (!active) {
        callScreen.classList.remove("ready");
        inactiveScreen.classList.add("visible");
        hasInitialisedTimers = false;
        return;
      }

      inactiveScreen.classList.remove("visible");

      document.title = (settings["Caller Name"] || "Active") + " Call";

      setText("callerName", settings["Caller Name"] || "Caller");
      setText("signalText", settings["Signal"] || "5G");

      const statusText = settings["Call Status Text"] || "";
      const statusEl = document.getElementById("callStatusText");

      if (statusText) {
        statusEl.textContent = statusText;
        statusEl.classList.add("visible");
      } else {
        statusEl.classList.remove("visible");
      }

      const battery = clamp(parseInt(settings["Battery %"] || "43", 10), 0, 100);
      setText("batteryPercent", battery + "%");
      document.getElementById("batteryFill").style.width = battery + "%";

      const signalBars = clamp(parseInt(settings["Signal Bars"] || "4", 10), 1, 4);
      document.getElementById("signalBars").className = "signal-bars bars-" + signalBars;

      setCssVar("--header-colour", settings["Header Colour"]);
      setCssVar("--middle-colour", settings["Middle Colour"]);
      setCssVar("--footer-colour", settings["Footer Colour"]);
      setCssVar("--text-colour", settings["Text Colour"]);
      setCssVar("--muted-text-colour", settings["Muted Text Colour"]);
      setCssVar("--avatar-colour", settings["Avatar Colour"]);
      setCssVar("--button-colour", settings["Button Colour"]);
      setCssVar("--hangup-colour", settings["Hangup Colour"]);

      if (settings["Wallpaper Image URL"]) {
        setCssVar("--wallpaper", `url("${settings["Wallpaper Image URL"]}")`);
      } else {
        setCssVar("--wallpaper", "none");
      }

      const avatar = document.getElementById("avatar");

      if (settings["Caller Image URL"]) {
        avatar.textContent = "";
        avatar.style.backgroundImage = `url("${settings["Caller Image URL"]}")`;
      } else {
        avatar.style.backgroundImage = "";
        avatar.textContent = settings["Avatar Initials"] || initials(settings["Caller Name"]);
      }

      initialiseTimersIfNeeded(settings);
      callScreen.classList.add("ready");
    }

    function initialiseTimersIfNeeded(settings) {
      if (hasInitialisedTimers) return;

      timerBaseSeconds = parseTimerToSeconds(settings["Call Timer"] || "00:00");
      timerStartedAt = Date.now();

      displayTimeBaseMinutes = parseClockToMinutes(settings["Display Time"] || "10:47");
      displayTimeStartedAt = Date.now();

      hasInitialisedTimers = true;
      updateLiveClocks();
    }

    function updateLiveClocks() {
      if (!hasInitialisedTimers) return;

      const elapsedSeconds = Math.floor((Date.now() - timerStartedAt) / 1000);
      setText("callTimer", formatTimer(timerBaseSeconds + elapsedSeconds));

      const elapsedMinutes = Math.floor((Date.now() - displayTimeStartedAt) / 60000);
      setText("displayTime", formatClockMinutes(displayTimeBaseMinutes + elapsedMinutes));
    }

    function parseTimerToSeconds(text) {
      const parts = String(text || "0").split(":").map(Number).filter(n => !isNaN(n));
      if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
      if (parts.length === 2) return parts[0] * 60 + parts[1];
      if (parts.length === 1) return parts[0];
      return 0;
    }

    function formatTimer(totalSeconds) {
      totalSeconds = Math.max(0, totalSeconds);

      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      if (hours > 0) {
        return String(hours).padStart(2, "0") + ":" +
          String(minutes).padStart(2, "0") + ":" +
          String(seconds).padStart(2, "0");
      }

      return String(minutes).padStart(2, "0") + ":" +
        String(seconds).padStart(2, "0");
    }

    function parseClockToMinutes(text) {
      const match = String(text || "").match(/^(\d{1,2}):(\d{2})$/);
      if (!match) return 0;
      return parseInt(match[1], 10) * 60 + parseInt(match[2], 10);
    }

    function formatClockMinutes(totalMinutes) {
      const minutesInDay = 24 * 60;
      const wrapped = ((totalMinutes % minutesInDay) + minutesInDay) % minutesInDay;
      const hours = Math.floor(wrapped / 60);
      const minutes = wrapped % 60;
      return String(hours).padStart(2, "0") + ":" + String(minutes).padStart(2, "0");
    }

    function setText(id, text) {
      document.getElementById(id).textContent = text;
    }

    function setCssVar(name, value) {
      if (value) document.documentElement.style.setProperty(name, value);
    }

    function clamp(value, min, max) {
      if (isNaN(value)) return min;
      return Math.max(min, Math.min(max, value));
    }

    function initials(name) {
      if (!name) return "?";
      return String(name)
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 2)
        .map(part => part[0].toUpperCase())
        .join("");
    }

    loadSettings();
    setInterval(loadSettings, 1000);
    setInterval(updateLiveClocks, 250);
  </script>
</body>
</html>
